front:
  text: 周氏冥通記卷之二翔七六月事一依本寫即事有隱者今未法詮記六月一日夜凡此端皆題紙皆作乙未年復見前丞來乃著進賢冠猶如前侍七白衣人所執持亦不異舒坐席坐南牀復有二人年並十五六許形服鮮麗皆作兩髻著衣似單衣復如桍似繡而非丞言曰一日有期差不爲疑仍指東邊一人曰此華陽之玉童定録保命二君令來相諭又指西邊人曰此紫陽之侍童二君昨諧紫陽陳卿事原應作此源紫陽乃戲言大族貞虚其中凌雲者理非一人定録曰此蓋見由耳紫陽笑曰東華紫微當焚録邪丞曰吾想此言實是賞讚卿也華陽童乃言曰夫騰龍駕霄之才理非涉世之用榮華疇應作籌字略之心豈會神眞之想爾情無滯念胸臆蕭豁是以果而速之若無此虚豁之心者則一志而不及一向而不迴此二能得道爾既無才學可稱又乏至德之美特是採縁訪命加以迹少愆累心無沉滯故得耳勿區區於世間流連於親識眷眄富貴希想味欲比並積罪之山川煮身之鼎钁善思此辭勿足爲樂若必寫此則仙道諧矣又問曰陶氏才識何如答曰德操淵深世無其比又曰然恐縁業不及如何紫陽童仍言曰君言君言是稱紫陽語也神仙易致而人德難全是故二象雖分其間猶混眞道可聞而不可見人道可見而其行難聞夫爲人者皆貪虐誕欲恣情任美所以三惡不離其心五情不節於體皆由先世種罪多故耳若生在中國知有道德人身完備才明行篤者皆宿命有福德也述君言似訖此爾宿世已生周家君之餘嗣也今生又在周家雖出庸俗先功未弭故得受學仙宫任神府君昨歎云一與其别已數百年矣誡子之辭訖勸子之言盡可善朂之方當往來不爲乆别又仍曰君已改子名字因人相告二童便出户丞曰二人言盡此皆眞君授其語令相論吾不得停尋更來下席便滅

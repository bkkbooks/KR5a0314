body:
  text: 七月事一依本寫即事有隱者今朱注詮記乙未年七月二日夜七人來一人姓周著玄華冠服緑毛帔丹霄飛裳佩流全鈴年可五十許眞誥有侍者四人執黄毛節一人姓王衣服似周服紫羽帔佩流金鈴年可四十許眞誥有侍者四人執緑毛節一人姓茅著遠遊冠玄毛帔紫錦衣佩流全鈴年可六十許眞誥有侍者三人執玄毛節又捧一白牙箱一人亦姓茅著芙蓉冠丹毛帔玄繡衣佩玉鈴年可六十許眞誥有侍者二人無所執一人姓周著華蓋冠服雲錦衣佩玉鈴年四十餘眞誥云名太賔侍者五人執紫毛節一人姓司馬著芙蓉冠服素羽帔紫錦衣佩玉鈴年四十許眞誥有侍者二人執青毛節一人則樂丞公服如前侍者五人眞誥有凡此前衣服並丞後見誥令識之丞曰今眞人來何不拜子良即起再拜頓首稽顙乞神仙之訣茅定録君曰功名已著無煩苦名並録我所關周紫陽曰一與爾别便數百年我當知如一日爾縈之經生死一何苦哉司馬括蒼曰學道不勤而得道者乃周生乎茅保命曰勤苦之弊何可備言所謂先苦後樂王紫陽曰歲月易積功業難顯昔聞周生之名今見周生之德宿昔猶固良可知矣應是嘉字周大夫曰周生年稚而德奧識淺而智深已三生如此我昔微遊於世數經詣之乃能傾襟布誠而施仁也我因欲示之要言而其未堪受法故不授之今得相見良亦爲欣周紫陽曰卿知其根由不乃吾之弟孫也音與其於南海相遇便别别來已二百餘年矣丞曰將告卿衆眞之第一紫陽左眞人治葛衍山周君第二紫陽古眞人治嶓冢山王君周君傳乃云紫陽有左右眞人亦不顯右是王君不知何名字第三定録茅中君第四保命茅小君第五蓬萊右大夫周君第六括蒼眞人司馬先生第七吾也此前六等並眞人前後來者皆仙人唯馮君是黄庭眞人治中嶽耳保命問曰粗悉此位不子良答蒙承垂告已解定録君曰前遣景上期授子玄眞内訣遂未修之邪子良曰蒙賜玄眞經即應修用但洪君前受洞房欲且營之成業故未暇耳又告曰洞房乃好得益遲修玄眞專勤者五年中便得太玄玉女侍猶勸先營之併修亦不相妨子良應爾王君曰子勤勵之名籍雖定中間縱怠亦未必得全此功爾勿輕示人今夕來事周大夫曰得仙者年年月月皆有但人下知耳爾申年當得上拜太極不者則酉年也此期非遠而亦復爲遥子勤此中間也司馬君曰子保舉既强得業亦美道必可諧但其流行之必不怠也子良受㫖一二謹依丞曰陶隱居事近亦不無此議卿姨屢有𧵥請二君乃無異但恐餘處不必允耳定録曰陶某名録多闕穿處不的由縱見由我我亦不得自任中旬間當與思和此保命字也往諸司命間論之意此必無苦勿卒憂悒仍云吾等今去或復尋更來其間有信書䟽亦可相通因以相隨而去右一條七月二日夜受記書四小青牋又一片續後按紫陽兩眞句曲二君此日若始自降前六月唯遣侍童耳眞誥云周太賔善鼓一絃琴是教孫登者爲蓬萊右夫人即應是也司馬括蒼内外書傳都不見又不應是季主乃可季主兒法育耳唯見此一來自後無復所出隱居此年四月自得夢應被召云宫府已整唯作印未成意甚惻惻徑向周說周登向其姨母道如此姨母乃密營𧵥信告潘淵文爲條疏作辭牒令周共奏請後天窗洞隱居都不知後方問有此亦不復問周可否至七月十三日事訣十四日旦周疏受見示方具耳止聞此一過而云屢有𧵥請是所未究乙未年七月三日夜有九女人來齊著青衣絳緑衣下紫爲腰帶佩金鈴鈴下有大符黑爲文書青上手並執板板白色似玉見衣縫縫皆有如織文綴之每縫際並有小鈴子著之行輒有聲其一女則劉玄微一則陶智安餘者皆不識亦不見與語劉夫人曰比修學稍得新業邪吾旦往東華今始還文書事粗得了見爾名已度上東華青簡甚助爲慶陶夫人曰聞近齋而俟北斗大不可言訝爾標心乃至於此星亦未可卒見積以歲月所不論耳劉夫人因唤諸女曰此周生有凌雲之秀將可與共語一人應曰下仙未敢與高人語劉曰高下未必可定伊猶沉滯塵喧共啓悟之耳何高之有此女笑曰别當相造今未容言陶曰此段易遷中有柳妙基謂應作姬字受口語音不得字體也孫芳華阮惠香此三女眞誥中皆無此三子學有功夫得度方諸第八朱臺中受書並爲仙妃故今知之劉曰周生爾欲之乎答曰凡蟲鳥非所敢希曰爾得希之所以相告陶曰夜已深宜去便欲去諸女曰待儂因相隨而滅右一條三日夜所受記書兩小青紙按此即是前月所云送學簿呈東華還過而下見趙王乃更有餘人兼申嘲謔欲希之辭夫以涵育兩儀照臨日月山澤通氣陰陽離會莫不皆須匹偶共相映協自高眞以下减周斯義既已乆表昔記於令差非嫌惑但長幼貴賤年月賒促各有終運不必日均耳如其道超域外心凝化表者時或迹應作非復體諧接文殊之感現淨名之室作賔友稱寄對扶桑諒别有㫖矣七月九日夜見紫陽周王二眞人定録君三人衣服並如前侍者共可有十許人紫陽童亦在中自共語良乆定録君乃語子良曰比勞用心吾天事頻煩以疲我神此六日往東華見爾名已上青簡乃位爲保晨司始吾徒也不亦巍巍乎此乃冥符宿契雖非此間之職要應先當成就周紫陽仍曰爾自應得此位諸局司故不以明德相顯直奏功夫事致使移時夫涉眞境便多有試好固心力勿弱於其間王紫陽曰得如此甚好但恐以試爲難耳子良因請問不審幾試試若大小恐肉人邪僻能不憂懼王曰當兩小試或爲虎狼或爲殊聲異形以怖於人爾見此時但整心建意勿慞惶也若不過者怪應作壞字人功夫俄頃耳周少來神瞻强正小兒時獨宿空屋夜行林草了無忌憚未嘗魘驚及來茅山至移朱陽晨夜闇路去來恒獨行耳始近間人說從今八九月以來館廨往反必須一兩人相伴小侵闇則便執刀杖人間何忽爾亦爲作吚嗚相答此當是去期近密防諸試只二十六夕移東廨宿亦使一道士窗下伴眠道士覺其不得眠數起坐誦諸呪說此復是臨時猶慮有異於平日致驚怖耳而遂得免過當由功力强定録又曰昨東華集諸司命及土地神靈典司之徒檢課簡録見天下民人爲善者五十分無一而况於神仙萬萬之不過兩三耳其中功夫已成而復落除者亦不少吾將憂仙籍無復人也兼運度已逼灾世益難見東華上簿紫録内格中有上上眞録者五人已落二人補地解無復進補者上中眞者二十八人一落七人二人補下仙五人復還人中唯上一人補耳上下眞者三百人一落二十六人十一人補地解十五人還民中都復上八人耳上上仙者二百十一人一落四十二人十二人補三官中職六人成尸解二十四人成賤民都成五十人耳上中仙者二百九十三人一落七十人十人退成下仙八人得尸解五十一人還生民中復上十一人耳上下仙者四百三人一落七十八人二十人爲酆都所引四人被考三官五十四人還民間復上十九人耳始今月標落此諸人須至分節當上言太極更記死録於太山見此輩良爲可悲並皆修法不勤或先亡引逮所行乖道或先勤後怠失此功夫一何苦哉亦有垂登雲天者日月不空並下教眞人降授之其或處在深山或學道歷年人並不知此吾等亦時時教授如爾今日人誰知邪周君曰茅定録說此者是戒爾之深矣勿怠惰於其間爾乃近在下品仙人耳爾乃當登中仙之上得遊行太極控駕龍驎不亦快乎王君曰茅定録及周紫陽所誡實爲深矣足爲子之實録也此句曲山中亦有三四人入下仙品欲知之乎子良因問家師陶公何如答曰假令爾如其者則期眞不難也陶乆入下仙之上乃范幼冲等也一本作中仙之中後農墨點下仙之上未解所以既云乆入今當由怠替致降二喈邪范幼冲爲童初堅出眞誥中未知眞仙品與都水監何如耳已說句曲有四人欲知之乎而竟不得問是誰甚爲可恨今以耳眼所聞見者在男人中有蔣薛女人中有蔣宋並乆就修學其長少男女南北亦復數人或有德行或有信識但於學功未深耳許靈眞雖先聖之胤而有家累亦未得涉學楊超遠今雖在林屋先是舊句曲道士甚有才意今未知誰當會此三人之數者但應各加精勤庶充此限耳子良又問子良姨何如答曰乃得無大過但令勤之後身或取耳今生且未可言其姨母本錢塘人姓張三歲失父隨母重適永嘉徐家仍冒徐姓十歲便出家隨師學道在餘姚立精舍性至眞正唯攝妹兒子良一人至年三十五公制所逼諸道義勸令其作方便出適上虞朱家而遂陷世法以此耻慨致結氣病涉四年育一男便携還永嘉從此離絶至今十有一年乃云小來手未嘗殺蟲蟻妄折花草唯日中一食而恨性過嚴治於目下刻急如今所言乃得無大過獨是不無小失當以不能遂固節取命兼挫辱於神鬼故也學業既淺豈望今身有果但兩三生得以爲幸矣周君更問子良爾姓何等子良倉卒不得道前賜名字直云姓周名子良君勃然曰何以謬濫汝乃道士周太玄字虚靈而比於世中周子良邪汝名書玉簡皆作周太玄勿復勝應作稱字子良唯於世上名子良耳勿以隱名示於俗人天下人應得道者何限而偏依依於爾非直以挺命感眞亦如以親逮故耳昔有楊許者楊恒有神眞往來而許永不得見所以爾者許心徒勤謙猶欲想未除故不得見楊位亦不大於許其神凝志安萬邪不能干其正華綺不能亂其心故受語於楊今以示許也爾今得見吾等亦如楊之用行耳凡此事莫輕示人吾昔與裴清靈去來華僑處受其言語令以示許僑宿本俗民性氣虚疏不能隱祕告其一法迴而加增逢人不問愚賢輒敢便說之如此既多便迴受於揚耳僑乃流沉河水身没異方得脱以來始十四年耳今猶在鬼伍晝夜辛勤諸如此事可不慎乎爾勿示人此事也揚許及華僑事皆出眞誥中也定録曰昨見揚在東華吾乃要來其云欲來礙以諸事别當看之耳王君曰此月初乃見許侯與紫微夫人及右英共轡龍車往詣南眞紫微問我見有周太玄已刻紫録將應得道比欲觀其德業君見之不吾因答已經諧之乃有蕭然之德甚可啓悟紫微言别往看之明年秋事令得去紫微夫人主下教者定籙曰言語粗悉足爲周生保試今且去天務繁多明日望定因相隨而去此二更中來入四更乃去言誥多亦不能盡得記憶也右一條九日夜所受記書五白官紙此條中多說上落及宣漏諸事全是欲嚴相誡防恐脱言說便致譴黜既如此伊何由敢顯雖復王威加逼全帛滿堂亦當杜口道義等故自息求而此中引楊許之諭亦何必不别有所指追恨不知早相共理令闕佚漸加鑽訪必不徒然往矣如何猶冀於冥途之中既更通感耳七月十一日夜見桐栢徐鄧二人來衣服皆如前徐至便言曰名已果上東華定爲保晨司甚助欣慶鄧曰昨已應有說此事者子良答爾諸眞亦粗說其事但子良庸陋豈敢仰希恃蒙神眞提拂不論耳徐曰近見趙威伯作事上保命曰周子良字元龢右一人改名太玄字虚靈以其生周逵家已上紫録次生劉偉家復書玉編既經歷辛勤今謹依上科報以下仙爲保籍丞羽儀衣服如故法保命仍將往共定録省察良乆乃作讚上東華曰周玄秀德心志虚清謹按紫格可刻仙名東華乃更命以七月七日會仙官檢名薄因得爾品目位合中仙更奏上仙爲保晨司韓侯仍作事曰周太玄字虚靈右一人昔標懷道之志今建蕩然之德上合乾綱下應地紀依如仙格合中品之上伏見保晨司年限欲滿請選太玄以補之謹上青君命云如牒仍作簡文曰惟周太玄因業樹兹刻名仙簡爲保晨司此韓侯刻紫玉之簡赤金爲文以上言太上也吾聞此位尋滿不出一二年中應相召也子良問不審此位若爲羽儀徐答曰亦不可爲定更由功業之高下理有丹龍緑車玄羽之蓋素毛之節青衣玉女五人朱衣玉童七人執鴻翮之扇建扶靈之冠服紫羽之帔絳霄之衣帶寳玉之鈴六丁爲使萬神受保知天下神仙功夫之事教學之方非復人間保籍丞也故指來相報未可示人身之遺迹乃後人之所效耳鄧曰桐栢眞君乃欲來須見太虚司陰二眞既累去後與兩小兒竟夕栟檔恐明日人來見縱迹於是内外無知者以至于今唯密以啓聞耳尋此便是前縁所招或咎譴應至定録趙丞灼然知見而不可校也尋既未知應爲此位那言不大欲爲恐是懸照此意自發上道心禀老君誡解其性理習忘相懷於一切有爲無復執著與時求道之志便有濃淡故以推心知當不大欲爲耳今既忘言於取捨便亦不辭此任但令得在能利益衆生處雖卑雖苦甘心爲之後云雖欲蕩情散慮亦未能都去此實神察六七往道中猶煩惱未盡汎此信忍望都除邪五年十年非但未定朝聞夕嬪亦是所願周生既已見捨便欲促往尋之依别記目録此月十五日保命授三天龍文并令且混人勿異迹行來動靜但意云此一條不顯出恐是與龍文别封也右一條十一日夜所受記書三白官紙此條中便是定位即云待前人滿則未便到職但未知猶且領永仕俟期而去爲不成稱丞直遊散住邪此非可意求須有通感髣髴乃可知耳計今必應猶在洞中也十三日夜定録趙丞俱來定録曰昨與思和至太元府仍詣南夫人論陶某事乃得由少時子良問申幾時又曰未測幾時或五年十年事雖關我亦由上府繼東華隸司命未敢爲定趙丞仍曰且已被東宫命令且住召陶某事子良問召爲何職仙官鬼官丞答蓬萊都水監高光坐治水事被責似欲以陶代之既且停召當更選耳此是仙官隸司陰府掌水事以陶有勞故得補之如陶意似不大欲爲此位既仙陶當不知卿可以事白陶也少許時又曰夫人生禍延福凑皆有因而至非神明之所如陶今夕心意豈復憶此雖云欲蕩清散慮恐亦未能都去如何復言合丹事云云不知此所道弗聞可恨也又言青童大君月未當來華當脱陽字檢選仙事云云右一條十三日夜所受記書一小白紙按此告即符前二日所云中旬間共爲論也周以十四清旦來入嶺止疏前停召事見示即問周何意有今夕心意語答云亦不解所以見意色甚不好子良亦不敢問于時既密解此意便止不更重論嶺裏以十三夕一更忽被冠似有六七人皆執杖奄至階前前一人唤言在御仗中蒙假還東畔等數人乏資糧故來就先生乞于時已閉户未眠聞此便開户當對呼進隨意所須衣服物器一皆捨與别屋雨小兒並被録置既從來未嘗見此不能不懼而猶向其道但各取重擔徐去必無告討正恐君劫道十罪重我當作好意相與使後也十八日夜見定録曰陶乃答吾前語年限猶未定别更報爾所云欲住雷平山後此亦不勝今居論灾厲刀兵水火之事乃爲好耳此地本非可隱居寂處直可以避灾害住與不住無勝否也又論方託形何處此由人心心既未發吾寧得知方將而言唯句曲可住吴越名山乃不少未見有大勝地猶勸陶居此山右一條十八日夜所受記書一白藤紙陶隱居既得周所宣事以十五日疏作辭語與周令接覲之日爲申陳如此即是相酬之告周竟不以此見向道當是無正可否以宣也于時至尊垂恩爲置宋長沙道士二廨并左右空地於此廨西復爲起觀前左右即是許長史舊基竊恐則近眞縱或以致譴故二三因聞耳追恨不得作方畐通辭方畐通辭則亦應方畐酬答也二十五日夜夢見唐趙二丞來趙曰近何意恒勞苦損人精神惛人耳眼令去勿復遇辛苦子良問不審住此廨中好否比者恒憂與盜事趙迴頭曰此事關唐丞唐丞仍曰雖見關亦不得自由夫灾禍亦非鬼神所知此廨自不須多憂疲人心慮子良言劫盜事深以仰憑答曰自保朂不須過憂便去君論期運事竟應相造也我等且去尋復相過子良起送相隨而滅右一條二十五日夜夢所受記書一白官紙此夏旱人清惡山有尊長但慮驚怖畐故以此祈訪也唐丞名公房亦四丞之一云主死生計劫盜事正應由樂丞不知關唐也記中從來見唐來事今若始遂應有始相識語恐前已有不必存記耳西廨此後至今顧蒙安隱也依别記目録此月二十八日唐丞又云劫盜事不令憂云云此不顯恐是不録也右起七月三日至二十五日凡有七條事書青白大小合十紙於目録中闕一條餘悉具足也周氏冥通記卷之三

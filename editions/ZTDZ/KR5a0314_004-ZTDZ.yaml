body:
  text: 右四條五月中事今别撰在第一卷三條云見一條云夢乙未年六月一日保命趙丞華陽司農玉童紫陽内宫玉童各告治身之行云云乙未年六月四日華陽童告人駡辱令心勿受云云乙未年六月六日桐栢仙人鄧君來結冥友云云乙未年六月八日紫陽玉童宣周君㫖改名字云云乙未年六月九日聞人隱告坐卧偃房事云云又保命趙丞告流汗事云云乙未年六月十一日於東嶺宿易遷女仙李飛華告有五女仙欲來云云乙未年六月十二日中嶽眞人馮君蕭閑堂主張君中嶽仙人洪君保命府樂丞華陽玉童凡五人告長生要言云云乙未年六月十三日范帥告勿食肉事云云乙未年六月十五日中嶽洪先生授洞房經云云今闕此記乙未年六月十五日范帥遣人來重責食肉事云云嶽去後來乙未年六月十九日易遷五女仙來告生死因縁根本云云乙未年六月二十一日趙丞遣黄元平告請雨事云云乙未年六月二十四日蒼梧仙人徐君棺槨事云云乙未年六月二十四日趙丞又遣來告請雨騰辭蒼梧去後云云今闕此事乙未年六月二十五日黄元平告已落太山死籍云云乙未年六月二十七日華陽童宣定録㫖授玄眞經云云令闕此記乙未年六月二十九日蒼梧徐君執蓋鄧君告名已上東華云云右十七條六月中事今别撰在第二卷凡闕三條今見十四條並不言夢乙未年七月二日紫陽周王二眞人定録保命二眞君周大夫司馬括蒼樂丞同來大論語事云云又及隱𧵥事云云乙未年七月三日易遷有女仙來云名已上青簡云云乙未年七月九日二紫陽定録告已進爲保晨司并輪上落人數云云乙未年七月十一日徐鄧一人來云參定東華名說上事牒云云乙未年七月十三日定録君及趙丞告陶得停召合及事云云乙未年七月十五日保命君授三天龍文并令但且混人世勿爲異應行來動靜營爲出入任意但勿違犯正法耳條眞法時但默行莫令人知神明不以萬里爲遥不以山海爲難戀行應動任所趣勿以吾等爲礙云云今闕此記乙未年七月十八日見定録君云陶答語及問所住云云乙未年七月一十五日趙唐二丞告勿過勞神疲體云云乙未年七月二十八日唐丞告劫盜灾禍不須防慎不令有憂云云今闕此記右九條七月中事今别撰在第三卷闕二條今見有七條並或見或夢并右三十條並有具記唯闕五條從此後並無别記實爲深恨乙未年八月一日范監來告云此日諸眞相就論說歡已畢自今已後欲令自來處處遊觀云云此云來則非夢八月五日夢從一朱門崇闕入見司命君見授夜光芝云云夜光芝是句曲五種芝限八月七日夢入華陽中先經保命府後至定録間次往蕭閑探龍仙芝云云此則從北入而向南也龍仙芝亦見五種芝限八月九日夢至定録間見問云乃同人齋邪云云爾日在中堂王法明爲皇家塗炭齋八月十二日夢與定録君於華陽内共乘車侍玉女三十人奏天樂造南眞於丹城南眞見告云云因又告太元太元示以仙籍云云二眞府並在大霍也八月十五日夢與定録保命共往紫微夫人處云云紫微治玄龍宫應在北方八月十六日夢至方諸見青君府不見青君乃見韓太華丹青館宋夫人見告神仙之要委形之術云韓太華始以今年度東宫受書朱宫玉妃之賔友韓出眞誥也八月十九日又夢造方諸正見青君出遊楊君九華及許仙侯皆從因造韓侯見告簿籍事云云韓即前卷所云東宫典録籍者名惠期也八月二十一日夢與保命至蓬萊見周大夫又至一朱臺已闕青軒紫房云是司陰府陶某近正應治此東南一玄宫中因復行見一人面金色長短中形人著飛霄衣冠見告道法之事云云保命曰此是小天奉法人周大夫仍告道業因縁甚多云云周大夫即大賔眞誥亦云在蓬萊司陰君主天下水事事出馬君傳前不知那治在蓬萊小方諸多事道事亦出眞誥八月二十五日夢與范監趙丞至大衡山見南陵薛大夫中黄杜大夫見授隱變方因爾又行見一草屋甚高大絶有甘泉雜生衆華范監云此是遊仙之廬因共入坐屋下談神仙事云云薛杜二大夫眞誥中無也八月二十五日夢入華陽造定録諮來年十月可保得申延不答云可爾云云此其猶欲留世意所以發此請雖初云可爾恐後復相誥却審得申者則不應十月果去也八月二十六日夜夢定録保命來見告云明當復往東華過司命間既是天事不復得同當更爲訪韓侯論爾不更迴異不此前及復屢道名簡事此則不可爲定進退皆復由功過故也八月二十九日見上期來宣定録㫖云韓侯甚有懷於爾簡録猶因云云此云見來則非夢也上期是華陽重姓景名上期也右十三條八月中事二條是來十一條是夢往九月二日夢至華陽中見二君云云九月五日夢又至蓬萊先過司命司命見告服神丹應先須名上仙籍乃得服之云云乃至蓬萊見周大夫食一草狀如槐香而紫色見告云子未得食此得食此便如吾耳及火棗交梨事云云火棗交梨出眞誥中亦童不知此果是何神奇九月八日夢與趙丞共遊易遷童初二宫二宫相去可五六里易遷女仙宫童初男仙宫而未知東西列爲南北列耳也九月十日夢與保命到一山山形平團異於人間山名爲丹龍云中有洞多仙眞丹龍云在陽洛之南是南眞所治之宫也九月十五日夢獨往桐栢山見全庭館珠寳焕麗宫室行列殊多亦有青黄盡相似復云有金庭洞宫自所見者非其限乃衆仙之遊憩典司之所治耳非王眞人所居東方大君來時别復有宫雖云有而自不見桐栢右弼王所治之處亦云山内外並有宫府九月二十三曰夢定録來於朱陽見携到司命府道逢玄清紫微二夫人乘雲軿從二十餘玉女語定録云司命紫陽正相遲塵生今來亦是其冥意言見笑爲塵生不言是陳生定録答語云云當爾時亦不知在何所但覺不然而行耳到司命門即見紫陽共見告大有所言非可具記此應有奇事也九月二十五日忽夢見張理禁令誦道德云云道德二篇實道書之宗極太極眞人亦云誦之萬過白日昇天右從前來至此並墨書大度西麻凡七百紙九月二十九日夢見天西北有一物長數十丈青赤色首尾等大狀似虹因到張理禁處問此爲何物答云名玄霞之獸或呼爲水母乃可愁矣夫有中之無未若無中之無空無之理難可思議此九六之灾顯矣人誰知之張爲保命府禁伯主請雨水故以問之事出眞誥張既善談虚無每語輒入斯境隱居謂有中之無自性空也無中之無畢竟空也但水解說此何指耳右八條九月中事並記云夢十月二日夢見洪先生見令誦太素祝云云未詳此出何經十月五日夢見定録君云比來多諸進御善自禁節勿縱志也似應作恣字既亟有上落實宜恒加精勤也十一日見紫陽定録保命桐栢來及移朱陽事云云不知論此可否云何十八日見定録云朱陽非爾所居處若不能遠去只朱陽左側亦好良常爲勝恐爾不能處之耳此月十九日隱居始移朱陽住周亦同來既是公館當慮有日之事以爲妨礙故也二十日夢見南眞紫微云云二十七日夢見趙丞洪先生及星事云云猶應是司二星事耳二十九日夢至一處名爲陰城之宫大有仙人而自不識未見陰城宫所出處右七條十月中事二絛云見五條云夢十一月三日夢見洪君及唐丞言曰雲闇星没唯宜矚南山坐耳此雖可瞻而非求眞之體三日應司二星既雲闇亦不宜便眠耳十一月八日夢見定録因自陳欲寄朱陽東爲小屋未審可爾不答云東好所恨下葬爲不便耳夫居當作四合舍不者不可不作堂東西厢若不爾名爲孤凶宅但以意作之爾其去矣以遺來者吾見陶某比意大欲相試爾但浮此跡勿畏人不信得不信乃爲吾之快矣東岡有兩大窠皆可營墓初本欲於西窠作廨恨廣大更令就窠西立廨近朱陽爲好周今定葬東窠正南向十三日夢見周君言曰陶某或信不信多好試人但爾比亦喧然多諸雜想可自節此頻頻告云陶或信不信欲相試今追思不意的有不信事自從遺想來凡一切有爲通無爾恨耳於周事實亦謙尚亦不乖背正自愜然有時見其遇冗既率意嫌接神之體不應爾至於周欲别立屋便虚心相許自爲看地給錢一萬伊本顧即作三間堂東西厢各二間林竹至而道士心未善者互興言說遂不成復作厢止三間堂屋而已今日方見事迹如此明非已立意也比者微有凖擬猶欲追爲起之其留啓云止請留一間既爲遊舊之所今則並修理之不令蕪雜也十五日夢見洪君來告曰爾即欲所居西北面有故氣吾今共汝看之便往至彼處見一人形極醜陋君曰此即是大都畏人居之定無苦朱陽館及彼廨以後乃有兩三墎狀似古塚既林草榛蕪亦可經人埋塵不見有巫場處所云故氣正當魂爽輩耳既曰無苦便不爲害也二十日見一女人形容殊麗上下青衣侍二女至户内立而無言二十六日夢見周蓬萊云北斗已復不見而祝於二星云云當是二十七應司二星今夕已陰晦必不見也二十九日夢見茅二君周二君並有控乘遊於雷平直取伏龍定録並舉手見向如謝去狀雷早在館東南伏龍在西北便昇空從館十度故得相望也右七條十一月中事一條云見六條云夢十二月三日見徐隥應作鄧字二君言去二十九日桐栢府校籍頓誤上罪人典簿三人被責云云便不了此事所以也七日夢往司命處告玉清清玄事云云此所論殊高不略說也十一日夢見韓夫人云比者情志落落彌入眞相云云應是韓太華始以七月度東宫爲妃十九日見一人駕大車形容甚壯從者十人直見拜温凉而已二十一日定録告云前來拜者酆都執法君蔡子遷也爾方綜其上官故來通報耳云云保命府職僚皆總治酆岱丞位彌相關涉上宫當保籍任也二十五日見趙丞直云仙籍空矣爾勿憂矣故七月中定録所歎亦云方憂仙籍無人二十八日夕見定録趙丞范帥三人子良間所通辭仰呈君未君云適得君仍語丞云可速因直爾而已更别餘語云云此中似别有事㫖不容備言亦應是爲帥見有辭存右七條十二月中事五條云見二條云夢閏月三日夢見韓夫人云世上方無復蹤如可云云韓猶應是太華六日見洪先生云子勤之朂之前後事事也云云此亦勵怠耳十五日見保命云爾屋事勿以在懷傷人神氣其人尋來就上其正月欲戴屋而所顧師永不來乃云欲作辭告縣攝之帥定尋自來當由此故有今告也十八日夢大司命君問曰子欲仙不答實願仙云願仙何不學仙云云二十三日見洪先生云此所問泛舟者乃中嶽仙人干朴也其前生經識陶某耳非今生相識也豈復來於此邪去冬有人姓顧名道度從外江還云於大雷忽逢一人乘小小鹿頸船工劣容一人從浪中來直呼顧姓名云下都去欲寄書與茅山陶隱居隱居已與我欲助其功夫以獻主主正爾見作書垂當授與忽云罷君會不往山我尋自下云此人自稱姓彭顧至都匆匆往廣陵欲宣此消息而無方於華堅間過嗣眞館道士彊文敬因疏寄具還如此隱居唯聽其下亦不以問周周當是問彊說自私訪冥中既如此告便當不復自下二十五日見定録保命二君保命曰年内多勞扇削鬼神三官中奏爾云多罪吾已却之不宜三過如此云云伊蒙神眞扶奬如此不免三官所奏汎庸庸之徒邪唯各宜如履薄冰耳二十六日見周君云葛衍之東水已加八十一丈南衡山西邊頓崩爲淵云云二十八日見徐君云韓衆已復有事今與鄧生往看之云云此詎不衆字惠期邪衆亦云作霍林司命歲夕夢見司命南眞南眞見授一子大如鵝卵令噉之司命云道未成不得九轉之華且食此亦足明爾云云右八條閏月中事六條云見二條云夢右從八月初至閏月末凡六月中合五十一條事十六條云見三十五條云夢從九月二十九日來至此並朱書大度色紙並紙黄書共一紙也丙申年正月二日夢造小有天見王君云爾何遑遑於人間名已定勿虧頓於世路云云此王屋山清虚王君爲下教二十四眞人之首也十日見洪君范帥云明是戊寅上玄治建可戴屋云但宅不得其所洪云大象尚復無常人生有何定邪只此亦好又及洞經事云云其本欲取此日戴屋而師不來又小雨遂不果至丁亥日方得戴耳十一日見定録保命桐栢周君周君云爾不復翫眞道耶吾將去爾子良未得答定録乃云其心不然正是身廢耳紫陽試之邪保命云爾何意頓取人三百斛穀子良答不取又云見取何意頓取人三百斛穀子良答不取又云見取何云不取已爾别當埤之餘别自語所不能了其此數旬中爲起屋事恒慞惶不作恐身既廢心亦是急定録訝之耳取穀之事了不聞有此音迹計三百斛穀是百三十斛米平人六年食恐以爲食師以此米者其從來爲師使本是衣食弟子不應以此爲責伊云不取神證云取兩不應妄又云别當埤之思此答所不解十四夕夢見許仙侯等五人自共語許云自宅此宇未足乆便已近二百許年又聞一人答兆劫尚復倏爾此何足爲遠不知是誰許長史立山宅應是晋穆帝永和中至今一百六七十年耳十七夕見定録唐丞來中君云許侯近所言亦深哉唐丞論北臺事極多非可書銘北臺酆都北帝臺二十四夕見定録君云念眞不密穢氣無辯自云研瑩之云云二十七日見保命及洪君洪君云勿輕說人事云云此當有所試不知是何耳右七條起丙申年正月中事四條云見二條云夢三月三日夢見洪先生云北斗事云云此復是司二星也洪是授云故屢屢言之七日夢見定録云臨海燒山中有仙人遊在人間自號彭先生實是鄭玄字子陰陸渾仙人也朱交甫令其觀上人情及修道者其尋或當來先昨已往建安臨海人書與道士鄒堯云某人彭公在此不堯得而插靜櫺故人得見之其人亟乘一刀一刀小船而歌曰太霄何冥冥靈眞時下遊命我囂塗除採察雲中儔世路多淫濁眞誠不可搜促駕還陸嶺人間無與酬步行亦詠此其若來可不接之其人形中人面左邊有紫誌著黄絹帽多髯而前齒缺是也書此一條獨委曲者當是或欲示後人也燒山即赤水山今亦屬永寧樂或三縣共界未知鄒堯是何處人顯昭形服如此便是可察正恐伊知人識更復改容耳九日見趙丞云比者情志何甚索索云云十四日見定録云司命來月中旬當來西宫東官人亦並來故逆示云云此當是云三月十八日事見其此日亦有辭本存也二十日夢見司命君君見令取青此一字章漫永不可識也以呈司命司命云此可耳心未眞也當更研瑩見景上期來云二君今往龜山聊過令知如此所見意氣欲動前與人戲過致使時魅相侵賴得高監相爲不爾幾致變聞周在第中忽輔痛恐是此意高堅不知誰洞中不見此人也又曰裏屋人自稱不道士者是北星鬼官所使勿信之以邪情亟惑人壞人眞氣可急詣許駕去已遠不得乆停便去周在都仍就王法明同住南庾第道士館中在外屋宿當是欲進諸木問事故得此告其還多有問木者而都不說此事實能慎密也二十五日見唐趙二丞來云還於舊居便共覺蕭然多論九轉事云云并二君令告云云其是二十三日還至山意殊不許遊行人間九轉事無聞一何可歎也右六條二月中書五條云見一條云夢三月三日見保命告勿食草之正心及餘事云云紫文仙忌云爾止謂此一日耳八日見趙丞云天下邪鬼之事令慎之諸云云二十九日見保命云勿犯霧露云云右三條事三月中事並云見四月九曰見定録云前䟽文辭殊雅但恐心不必然耳云云不見此辭本也十五日見三丞及洪君來云欲下都邪勿不復反山諸人自共語多不了其于時欲出都定下果六月去耳右二條四月中事並云見五月九日夢見司命定録保命及衆眞並見試以縁業事云云色不悦又及應憂盜事云當時相救十五日夢到東宫拜青君見韓侯等雖不面見青君而傳驛意氣大見憐愍韓侯接對如常耳如此說者前韓衆便非惠期也二十九日夢司命三君云前事遣赤城外衛軍十人相助遂不能都此字草漫不可識也亦得可可耳不解此何若是前所云憂盜相救助者則不應言亦得可可也于時實都得寂然也右三條五月中事並云從正月來至此見並黄紙書大度細色紙凡四紙半前紙按年末朱書後六月十日於道中眠夢見范帥云惡魅横行不可卒禁勿輕慢之雖無如人何交爾不好云云周暫出都以此月九日曉出山就埭宿十日早發爾夕應在胡熟方山間此月中還近多温病十九日於第中夢斷肉乃食鵝膏未可解也追檢此日王法明文子在館宿延陵嵇茂先亦入其多責郭邑殽果食中必有鵝膏煎煮之也二十八日夕夢見紫微遊行云云右三條六月中事一條云見二條云夢七月一日見洪先生云八霞之表已陳爾居處東萊可不裝束云云大多不可復載此中當說去留文會八日復夢見韓侯紫微楊君定録等多爲論性命之致因縁罪福之源若疏此可三四紙許不聞此亦爲殊恨也十七日見保命趙丞多論天地灾横之事亦甚多不可記此事理難當說二十三日見衆眞凡三十人多論人治身之本謝殃之法甚多亦復論作九轉事云云此條不顯爲恨最深右四條七月中事三條云見一條云夢從六月初來共紙一大度白牋紙也右從丙申年正月初至七月末凡七月中合二十八條十八條云見十條云夢右從目録凡用墨朱黄三色書大度白及細紙合十六番八番白八番色并右從去乙未年五月二十三日初通至今丙申年七月末合一百九條六十三條云見四十六條云夢從八月初至十月二十七日捨世凡三月日中文書記不復顯出尋入今年來月月所記自疏簡未知是不復悉記爲時近致希邪周紫陽記九眞玉瀝丹方云輕於九轉易於九轉此别一紙無日月九莖紫菌琅葛芝一斤出南閩句曲北亦有丹朱玉漿二斗出南閩此間亦有也右二物細切芝竟仍以玉漿一斗漬之一宿埋陰垣之陽去垣三寸入土一尺以白瓦器容四斗許盛仍以瓦盤蓋之蠟密封之上土令厚二寸以今日午時埋至明日午時出之持之南行取己所住户十二步乃置眠牀頭按上至明日午時又以銅器盛煎之令火齊器底勿令火豔岀器邊也得三沸竟又内玉漿一斗又加火高初五分許可以蓬蒿爲薪煎令餘一斗漉滓乾之閉汁三日三日竟開視上當有紫光曜目夜不用然燈此即成矣又以藥滓置木臼中搗三百二十杵紙裹令密若以投水水流即停若封屋室萬人不能開若儷劫賊合衆不能動封山山開封人人伏若欲速登天可併服之即死矣若欲且留世當稍服之盡亦仙矣勿以分人及令人知見也唯可心知口服而已若令人知空失此藥也右此一方無年月日不知何時書滿一白牋紙謹正此藥名既又云唯可心知便是難可思詳已歷問同住人大小咸云不覺見垣内埋藥亦不聞木臼搗聲恐或别處作不論耳即云服之即死故追以疑雖見温酒亦或假以亂之耳言大凡四卷眞本書雜色合六十五番或眞或草行周氏冥通記卷之四

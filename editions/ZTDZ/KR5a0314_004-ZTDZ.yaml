front:
  text: 周氏冥通記卷之四此卷從乙未年五月二十三日初通至丙申年七月末月月悉記所通目録其五六七月並具有即前别三卷自八月後至今年七月末止有此年目録無更别記乙未年五月二十三日晝保命府趙丞告云云乙未年五月二十三日夜保命范帥告云云乙未年五月二十七日夜中嶽仙人洪先生告伺二星云云乙未年五月二十八日晝夢食合金液醮云云

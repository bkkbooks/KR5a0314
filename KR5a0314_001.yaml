front:
  text: 周氏冥通記卷之一翔六玄人周子良字元和茅山陶隱居之弟子也本豫州汝南郡汝南縣都鄉吉遷里人寓居丹陽建康西鄉清化里世為胄族江左有聞晚葉雕流淪胥以瘁祖文朗舉秀才宋江夏王國左常侍所生父耀宗小名金剛文朗第五子郡五官掾别住餘姚天監二年亡年三十四仍假葬為所繼伯父耀旭本州主簿揚州議曹從事母永嘉徐淨光懷娠五月夢一切仙室中聖皆起行四面來繞己身乃以建武四年丁丑歲正月二日人定時生於餘姚明星里期歲為姨寶光所攝養同如母之義子良幼植端惠立性和雅家人未嘗見其愠色十歲隨其所養母還永嘉天監七年隱居東遊海嶽權住永寧青嶂山隱居入東本往餘姚乘海舫取晋安霍山平晚下浙江而潮來掣船直向定山非人力所能制因仍上東陽欲停永康忽值永嘉人談述彼山水甚美復相隨度嶠至郡投永寧令陸襄陸仍自送憩天師治堂而子良始已寄治內住於此相識今討核緣由如神靈所召故其得來此山不爾莫測其然于時子良年十二仍求入山伏節為弟子始受仙靈籙老子五千文西嶽公禁虎豹符便專心於香燈之務凡好書畫人間雜伎經心則能後隨往南霍及反木溜旦夕承奉必盡恭勤十一年從還茅嶺此後進受五嶽圖三皇內文十二年秋其家中表親族來投山居乃出就西阿别廨住以十四年乙未歲五月二十三夏至日於廨忽未中寢卧彌淪良久乃起出姨母不解所以深加辨切乃頗說所見具如别記自爾於四五旬中大覺為異恆垂簾掩扉斷人入室燒香獨住日中止進一升蜜餐周家本事俗神姨舅及道義咸恐是俗神所假或謂欲染邪氣亟相蹙問唯答云許終是婁羅夢無所知究自懷愁慮為復斷隔耳於是衆人莫測可否相與縱置聽看趣向其七月中乃密受真㫖令外混世迹勿使疑異從此趨走執事乃過於常日其年十月從移朱陽師後别居東山便專住西館掌理外任應接道俗莫不愛敬本性君子訥言敏行所可云為默而能濟清修公正纖毫無私去冬欲潛依冥㫖逆須别字託以方便冒求搆立雖建三間粗屋經時未畢入此年十月便密自成辨窗户牀簾至十九乃竟親屬道義齎其上果要往看之覺其潛形側容並莫知所以至二十六日密封題東西館諸户閣廨處磨洗以文簿器物料付何文幸爾夕自移衾枕出所住廨云當暫齊或云暫行二十七旦獨在住家廨及還館中言色平然了無一異更香湯沐浴著諸淨衣與文幸碁博讀書而屢瞻晷景至日昳後便起云時至矣即東帶燒香往師經堂中遍禮道衆徑出還所住廨住廨住屋唯有三間住東一間西二間亦安兩高坐並有香火也衆人正言應就齊去日晡間其弟名子平往看正見於仙屋燒香出還住户問子平何以來答云姨娘氣發唤兄還合藥煮湯語云我體亦小惡即時欲服藥竟當還若未即還汝可更來仍見鐺中溫半升酒子平馳還說此姨母驚怪亟令走往已正見偃卧子平不敢便進俄頃所生母及姨母續至見便悲叫問何意何意唯閉眼舉手三彈指云莫聲叫莫聲叫誤人事其母欲捧頭起而蹴巾轉猶舉手再過正巾須臾氣絶時用香爐燒一片薰陸如貍豆大煙猶未息計此正當半食頃耳時年二十先已裝束內衣上止著眠衣加以法服並堅結其帶脫羣襦卷辟之容質鮮淨不異於生一切聞見莫不歎駭以二十九日日昳後嬪仍造礲冢於東岡十一月三日丙寅日昳後窆即捧土成墳此後音影寂寥未通寤寐將同人神之隔為機會俟時乎其得道原由品號自具顯所受記中今略疏在世事跡共所聞見如此故載之記前又爾曰於書案上得四函書並封題上皆濕一函與師一函與後廨姨母等一函與舅徐普明一大函有四紙與南館東山諸道士並是告别同云二十七日計此當時是從朱陽還仍作書作書竟便燒香也又檢溫鐺中猶如常酒氣瓦盆中已被水蕩無氣都不見藥蹤迹竟不測何所因託檢記中得藥方或疑脫是此師既惋慨此事追恨不早研究函今人委曲科檢諸篋藴庶睹遺記而永無一札文幸云一十六日燒兩束書可百餘紙不聽人見意疑此必皆已焚毁懊惜彌切心猶未弭十一月旦甲子試自往燕口山洞尋看果見封投一大函登崎嶽鈎取拜請將還開視即是從來受㫖五月唯有夏至日後四事六月七月並具足從八月後至今年七月末止疏目録略舉事端稱云而已未測亦並有事如六七月而不存録為當不復備記止徑略如此邪今以意求恐是不復疏之何知爾尋初降數旬中已得間靜後既混糅恆親紛務不展避人題之紙墨直止録條領耳想此十餘月中訓諭何限惜乎弗問此師之咎矣所封函中皆散紙雜糅今依日月次第相連如法也又從今年八月至十月都不復見一條又尋所燒者定當非此例無容一封一焚故也亦可是焚不可顯出者也又從來有令師及姨母知者止有數條一者初夏至日晝眠內外怪責不得不說二者斷不食脯肉亦被怪不得不說三者與師共辭請雨真㫖令改朱用墨此不得不說四者師得停召真㫖令告知此不得不說所可指的唯此四事自餘或有訪問皆依違末略初不顯詔又師經一過因辭訪移朱陽及有所當事後屢問蒙答以不每云未報遂不顯言今料視定已有答尋此當是恐問便有酬者則人人因託不少若不為問則被人責若悉為問便忤冥㫖是以皆匿隱之此記中多有真仙諱字并諸教戒便同依經誥之例皆須淨案淨巾沐浴燒香乃看之若欲傳寫亦應先關告衆真及玄人不得皆悠悠外書記也周所住廨庭壇有數株大柏樹其户前一樹甚豐茂甲午年臘月望日忽見有如糖灑遍樹上下中間尤多于時晡許華陽都講丁景達來看徐普明并見之驚問見此甘露降下家人不欲顯此事仍戲言向小兒以糖沃之耳因共擲嘗正如密味亟折兩枝見示以插户簾上十餘日猶在按瑞圖甘露降竹柏乃是瑞氣降按說尋此庭壇邊諸樹略育唯此對户者獨濃必當是欲顯已應有神靈降引之事故也又周所住屋南步廓夾兩邊種竹竹根穿入廊下乙未年五月十八日共其舅徐普明在中堂為謝家大齊三日竟散齊日中後其舅暫還廨忽見步廊竹根生一筍三寸已上分為二條並抽筠籜齊長九寸昨都不見而今忽有普明知是異恐小兒拔弄仍折取來中堂遍示諸道士咸共嗟歎未嘗有此隱居深恨不置令成竹又恐爛壞乃炙乾録之即日猶在按竹是星精多會神用湘州人作同心竹皆伺抽筍因刻邊為孔筍乃帶創成四此猶是一竿竹唯中央兩邊凹耳未嘗有一竹而分為兩筍共本各未者此月二十三日夏至日便有感降事當是復表其冥符合歡有柏竹之德也又周移朱陽館於東立屋積茅在屋東北覆屋後殘茅周往更斂積忽見一白龜可長六寸許身形皮甲通白如滑石唯厭上有四黑文狀如書字不可識捉取玩弄良久乃欲將還意不敢遂放之還即向其家說此按龜本靈物久壽先知又出積茅之下欲表是茅嶺之靈凡白物率皆神奇隱居聞此欲表上之更尋覓不復見而佐近道士多云柳谷間常有一白龜人欲取輒失去疑此龜猶當是而數百步家此積茅中第恐有以也

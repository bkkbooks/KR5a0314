body:
  text: 右此追記憶見其經有此諸異事二條啓事臣弘景啓去十月將末忽有周氏事既在齊禁無由即得啓聞今謹撰事迹凡四卷如别上呈但某覆障疑網不早信悟追自咎悼分貽刻責淵文口具陳述伏願宥以暗惰謹啓十二月十六日勑答省疏并見周氏遺跡真言顯然符驗前誥二三明白益為奇特四卷今留之見淵文并具一一唯增讚歎十二月二十日神筆右此周去時先生正在鬱岡隱齊葉限不獲即得啓聞後撰寫遺記畢方遣潘中正出啓上呈聖上登於內殿開讀四卷委曲備小事事顧問亦隨事奉答右周傳五月事一依本寫即事有隱者令朱注詮詔夏至日未中少許天監十四年乙未歲五月二十三日乙丑也在所住户南牀眠始覺仍令善生下簾于時住在西阿姨母廨中善生是兩姨弟本姓朱七歲時在永嘉病十餘日正爾就盡隱居若為救治仍捨給為道子又眠未熟忽見一人長可七尺面小口鼻猛眉多少有鬚青白色年可四十許著朱衣赤幘上載蟬垂纓極長紫革帶廣七寸許帶鞶囊鞶囊作龍頭足著兩頭舄舄紫色行時有聲索索然從者十二人二人提裾作兩髻髻如永嘉老姥髻此髻法寬根垂到額也紫衫青袴履縛袴極緩三人著紫袴褶平巾幘手各執簡簡上有字不可識又七人並白布袴褶自履靺悉有所執一人挾坐席一人把如意五色毛扇一人把大卷書一人持紙筆大硯硯黑色筆猶如世上筆一人捉繖繖狀如毛羽又似綵帛斑駮可愛繖形圓深柄黑色極長入屋後倚簷前其二人並持囊囊大如小柱似有文書挾席人舒置書牀上席白色有光明草縷如䓉子但織縷尤大耳侍者六人入户並倚子平牀前此人始入户便皺面云居太近後仍就座以臂隱書按于時筆及約尺悉在桉上便自捉內格中移格置北頭所住屋是西厢有兩間去堂屋止三間步廊子云太近後恐是逼堂而堂于時已被燒盡未解近後之㫖住屋東向北邊安户五尺眠牀約西壁即所晝寢者頭首西故得見外又一五尺安北壁即子平住也一方五尺安窗下施書桉東向硯本在桉北頭筆格在南頭故移就硯而隱桉也問左右那不將几來答曰官近行不將來乃謂子良曰我是此山府丞嘉卿無愆故來相造子良乃起整衫未答云豫時自覺起對分明而人見身猶卧侃侃不自解仍問曰今是吉日日已欲中卿齊不答依常朝拜中食耳未曉齊法又日中食亦足但夏月眠不益人莫恆貪眠又答體羸有小事竟覺倦倦如欲眠不能自禁曰小小消息無苦因風起吹繖欲倒仍令左右看繖赤豆在庭中戲走來垂至繖邊左右以手格去郎善又來架子上取塸觸此左右善便倒地此左右以手接之此人間那得此小兒子子良答家在錢塘姓俞權寄此住又曰勿令裸身善神見之小男兒名赤豆年五歲是俞僧夏兒云多灾厄暫寄道士間夏月裸身出戲又問郎善何人子良答家在永嘉依廕陶先生又日陶有美志為人所歸投郎善姓徐樂成縣人年十六七許先依隨隱居還山今已去又語子良曰卿父昔不無小過釋來已三年今處無事地自云墳冢在越雖自羈回亦不願移之南頭有一坎宜塞去其今欲同來有文書事未了不果明年春當生王家以其前過未盡故復出世子良本欲以甲午年迎父柩出西事不果周是角家過此未申酉歲乃更議當是其父不許移故因此告即往驗果有坎已塞竟卿前身有福得值正法今生又不失人神之心桉録籍卿大命乃猶餘四十六年夫生為人實依依於世上死為神則戀戀於幽冥實而論之幽冥為勝今府中闕一任欲以卿補之事目將定莫復多言來年十月當相召可逆營辦具故來相告若不從此命者則三官符至可不慎之子良便有懼色此人曰卿趣欲住世種罪何為得補吾洞中之職面對天真遊行聖府自計天下無勝此處子良乃曰唯仰由耳又曰卿自幼至今不無小愆可自思悔謝若不爾者亦為身纍凡修道者皆不裸身露髻枉濫無辜起止飲食悉應依科聊復相告言窮於此今還所任方事猶疑冀非遠耳卿朂吾言勿示世中悠悠之人山中同氣知之無嫌便下席未出户見門上有令春劉白等令春是姨母間婢子劉白是白從子乃又曰勿令小兒輩逼壇靖靖中有真經前失火處大屋基今猶有吏兵防護莫輕汙慢其輩無知事延家主門是前中隔閣靜屋及壇在閣外經堂被燒移經出安靜中堂屋四間東二間作齊堂西二間姨母住始其年四月二十三日遭燒四間都盡姨母修黃庭三一供養魏傳蘇傳及五嶽三皇五符等所云真經當指在此但未解空基處云何猶有防守之卿姨病源乃重雖不能致斃亦難除子良因問不審若為治療腹中又有結病何當得除答曰不可即除歲月之間不知若為耳腹中亦有卒可差别當向卿言前云事延家主家主即姨母所以自說病事不由於請問也姨母年四十七素患風冷恆上氣腹左邊有氣結如杯大從來醫藥所不能愈也令春等去便下階而滅尋神明出入無方乃並牀不疑而亦有避人時蓋是遏穢賤者不可觸冒右一條是夏至日書所受記書四粗白紙此承依别自是趙於保命四承居火著名或伯河東人主記仙籍并風雨水領五芝全玉草事出真誥其夕三更中復聞一人扣户云范帥來未應已進修壯形貌端嚴著大冠似如幘服緋從者唯三人衣色黑暗暗不可别户外有光狀如把燭不見光形帥倚牀前而言曰僕姓范為定録府鬼神之司定録保命二府同在一域而名界有分各天真守之二君並姓茅是兄弟兄弟定録弟守保命卿亦應已知之向有大丞遊行界域記人罪福過造卿聞二君及府中諸監僚選卿為保籍丞此位乃始立以助領諸簿録其任數小而高清為美兼得宗庇真仙二三為宜卿向酬對丞極不惡後何以與姨議異遂使日司聞之以白丞又疑是祅俗丞大不悅欲執卿為無信之過故令僕來相告觀卿俗意未豁囂塵易迷何以苟縱於七魄而拘制於三魂實由卿素履帛家之事此輩小物亟稱其功而惑人意其為牧約之卿儻早議不乖則墨簡不書周家本事俗神禱俗稱是帛家道許先生被試時亦云爾子良祖母姓杜為大師巫故相染逮外氏徐家舊道祭酒姨母化其父一房入道是以恆慮為俗神所犯爾日見其淪朴不已乃具相戒約既未達真㫖故不得不挾疑耳子良曰向實有疑令敢復異帥曰夫神聖有㫖豈是辭訟所讜兼向丞總領吳越任之大者自來宣諭何得不從尊府君亦有訴於丞云無復嗣丞已不許幽冥面告尚不得停而况穢身投片辭亦自不達達亦不許徒勞紙墨耳于時姨母欲奏章上言并令其作辭陳訴故師此語以斷也卿朝夕燒香乞長生神仙今既果願復何所言二真今中間往太元府至今未反恐還當問丞故令先來相實可依心答㫖二君兄是大司命太元真人治大霍之赤城當是夏至日往彼朝詳未反也子良答曰俗人童蒙不辨真正曲垂貸宥實敢回異帥直云好又曰卿每禮拜先依科朝四方竟輒更禮拜司命定録保命三真君既居鄉故應爾于時子良屐橫在牀前又不著衣眠帥云作道士法不宜露眠不宜橫屐橫屐則邪不畏人子良唯應爾科戒云上牀脫履令正背牀蓋為如此凡道士應恆著眠衣服狀如小單衣法亦不得露髻寢也子良又問既靈聖垂㫖敢希久停可得申延數年不帥云下聲傍人聞前共疑議日司已白令來取實猶復求申更恐其聞奏故令下聲非必畏人聞于時子早亦在别牀眠又曰向所言事不得爾自已有定兼復此職不可久空所以勤勤重來者正此耳今又私與卿言勿泄之卿既無解術猶應栖質有所唯大嶺之南故園之地可得安厝若其地多石則看北良常山左側應好地莫還本基本基既塵穢兼復蕪滿若葬之必不為卿益竟不測嶺南園地在何處良常在朱陽東北十里許山連岡亦至此間從來不聞其履行看地今日倉卒便於此東岡營冢後得此記檢看去年十一月八日定録告云作屋處於卜葬不便尋其初作屋時欲近東大窠隱居嫌窠大而遠今還西館明知今葬處已是暗合先㫖雖非同此帥良常之言而會定録卜葬之告也既云無解術應栖質有所者則此尸骨不還所以令覓好安冢地耳其餘棺柩法周猶依世法用凡所受經符可以自隨者則其神衛從人復宜須三師姓諱兼受法年月恐三官水神復更考問皆應答對不得落漠留疏與家令事事亦如此是為依師教也自題五嶽圖三皇傳及諸經符並云佩隨身但不知三師的是何者即謂當作籍師度師經師義為直是師師相承之三世邪竟不問其尋覓此又經記所論人命終復不問仙之與鬼必皆由三官開過皆須有所承按根本由是言之師資之結殊不容易僕今去矣勿忘此證卿雖緣質有定亦須用謹正謹者邪氣不干神明衛護則招感易達卿既處此塵喧之中僕等難復數來仍手指壁上所疏桃竹湯方云脫覺體不快便依此方浴此方要卿那得子良答寫真誥中得帥曰此是南真告楊許者卿得之甚好二君亦摽挺言未絶聞子平覺便欻去右一條即夏至夜所受記細書一大度麻紙滿此范帥即保命四鬼帥范名疆五四帥之大者事出真誥但未了自稱僕而卿人之意二十七日二更中開眼見一人在牀前容質端正有鬚鬚甚厚細眉目年可二十餘顔狀其可愛著芙蓉冠垂青纓甚長著衣狀如單衣而有朱青黃白相雜厠似錦復非素腰帶不知是何所著亦有光如前范帥來時燭光也燭自而已自云是中山人因言曰茅君用爾為丞已遣丞帥來相報事已定吾今來教爾修道之方可從而言疏子良仍起襞紙疏之五月二十七日事此人見子良題此乃笑曰知記月為好歲代久遠後人見之知其何年子良曰前丞帥來已記年今詎須又日紙紙記為好子良因疏下作下四字太歲乙未按如此人言便非禁留世未解周封藏之意當示傳泄不由放已楊許先迹亦是他述故也夫作道士皆須知長生之要爾既未能餐霞飲景尅已求真徒在世上無益於體今所以相徴召者一以助時佐事二以受業治身庶積年月得其力耳五藏全其髓填實方可以求道爾今四體虛羸神精惛塞真期未可立待即亦可旦伺二星以通其感子良因問不審此星在何方面形模若為答曰北斗有九星今星七見二隱不出常以二十七日月生三日伺之其形焕耀異餘者爾今可畫作七星當隱約示其首向子良因染筆作七星形此人曰我無容運手爾但安二星置綱之頭當相告也次安此問是不答亦非二又安乩更間答此是也當燒香整心伺之見則祈乞隨心所願亦别有呪後當相告今夕三四更中可試看之勿令人知伺時人知則不可見也又曰吾今去勿輕示人世上亦有經子有宿業故口相受耳不聞開户聲徘徊而滅右一條二十七日夜所受記書一大度簿白麻相接續滿紙按别記此中山人姓洪名子涓本中嶽人今來華陽中不顯何職後受洞房經亦是北君是嘗教學者真浩中無此人也伺北斗二星法出方諸洞經中周從來都未窺上經性謹直亦不議求請追恨不得以諸具經及楊許真令一見之已雖不復仕此要自於師心有虧凡此三條皆髣佛夢耳不正分明又别夢見懸巖峙壁鬱然若似青嶂中某在山下望見山上有三人一人著遠遊冠錦繡之衣其意言是保命君一人猶是向高座上老子也相對而談某亦不解其語須臾便覺竟不知此二人後何所適右一條二十八日晝寢夢記書兩粗小白紙按尋記凡摽前云夢者是眠中所見其有直云某日見某事者皆是正耳覺時其見但未知為坐為卧耳從乙未年八月以後遊行諸處此皆是神去而身實不動也又諸記中往往有黵易字當是受㫖時匆匆後更思憶改之昔楊君迹中多如此右初起五月二十三日至二十八日凡四條事大書小八白紙並與目録相應無闕周氏冥通記卷之一

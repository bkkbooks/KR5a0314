body:
  text: 右一條一日夜所受記書兩小度粗白紙丞猶是趙丞華陽童依後記云姓景名本期紫陽童云姓鳳名靈芝按此云已改子名字别因人告而後八日來説所改名字即猶是此童也當是其今未敢言耳六月四日夜華陽童來授曰爾既挺思合神必不會世心中人惟欲求利爾不能益則有不悅爾今事人尊者若罵詈爾得罵時當存念身神耳可得聞而心勿受爾莫口應若罵畜生禽獸之屬皆當即沐浴此為賊身之大穢穢則真神不降邪氣侵人昔有劉文長師李少連少連苦酷不道鞭打駕誓無有時節文長受而口對積十一年山神遂侵試之後成邪注病今在保命丞間為散使緣前身有忠朴之心故得為正神所使少連今猶在河間晝夜辛苦不可得見譬如此事可不慎之言此而去右一條四日夜所受記書一白箋紙去歲聞其家説姨母常修服諸符恆令為書其既始有通感於書符失時兼亦不謹姨母責罵甚苦乃云人家養大亦須守吠逐鼠養沙已不得供養止書符寫書而不用意用汝何為伊于時意色極不好今有此告當由斯源也姨母以其年少伏事人恐過失每課厲非一從此後得罵便喜笑悅竟輒沐浴大小咸怪如此至於師長之間實未嘗加以言色今則文長少連為譬當以在三之義均耳六月六日夜見一人來儀服甚整著丹衣青帔芙蓉冠冠上又有小平蓋蓋青色紫緣邊背上佩三青色鈴年可二十餘面甚白微有鬚侍者四人二男二女至良久乃言曰我是桐柏仙人鄧靈期聞子合道故來相慰子良曰凡庸下賤少樂正法幸藉緣會得在山宅應作澤字何期真聖曲垂啓降自顧腐穢無地自安若前緣可採願賜開度仙人曰善哉辭也子千生已來種福多矣自然而會何待開授度子者當自有人吾特嘉子緣德來結交耳幸無謙辭桐柏當復有來者當善相待吾今去矣下旬間更相遇方事遊適兩念相存執手而去右一條六日夜所受記事一青紙依後别記鄧始得為桐柏帝晨執蓋御史領華陽學仙禁真誥中所無云桐柏復有來者當謂後徐玄真也六月八日夜紫陽童來裝服如前言曰欲知我姓字不子良曰願聞之童曰我本姓王字子遷太原人宿命時父為陳留太守仍移居丹陽我年十五化前身有福得生為人復修功德死為神補紫陽內宫玉童賜姓鳳字雲芝君今改子名為太玄字虛靈童凡所稱君者皆紫陽也不改姓仍取周也此名字中皆有旨趣今略為述之太者元始之極而質象含真玄者謂應虛無之氣挺分所至非修身立功所得虛者謂形同乎假志無苟滯蕭條而應真靈者謂在世而感神棄世而為靈此表裏成功饗流後裔也略陳其綱紀如此别有幽奧處未可便及此名不施於世且莫顯示子良字元和此乃世之善名亦不勝於世直是施於冥中耳言訖便去右一條八日夜所受記書一白滕紙其羣從兄弟皆以子字為名子良是其本父乍生便名此無別小名也字元和者是癸巳年十七於華陽東嶺冠師為作此字燒香啓告以受之按後記云所改名即是青録玉文者當周名仍取以名之六月九日夜夢聞人語不見人形聲氣高厲謂子良曰若披罩紫蓋遊適偃房者神仙之漸也唯言此而已意而言是定録神君隱告也須臾覺便見前丞丞曰向來者爾識之不答曰不識丞曰是真人爾未宜見之故遙相告爾按此前華陽中唯丞帥及童來而二君都未降今此隱告方為其始也又曰爾聞血臭不答不聞又曰爾體血流釋那不自知答曰自謂無血唯汗耳丞曰汗之與血一何異乎汗者血之精華人血猶如水寒則上凝夏則上清清則流泄易凝則決冰而血出是爾陂塘虛微故不能止於流耳人血如淵水不厭其溢但患其謁吾有築塘之術當為爾治之今但俟景挹華亦能微微為效吾今且去外已有人來下席而滅即見一人入侍者三人來至牀前而言曰我是張孝字子安榮陽梨井人也直言此而滅見年可三十許巾紫方冠著繡衣當是高仙人右一條九日夜一夢聞一受記書一白藤紙依别記張子安是華陽中蕭間堂主上真誥所無六月十一日夜有一女人來嶺裏形貌妍麗作大髻通青衣言曰今夕易遷中有四人欲來爾所住處今既在此當不果至十九日只當來耳子良言侍從師還此不知今夕有垂降者欲還住處仰俟可得爾不女曰既已在此已夜不須復還恐人相疑亦不須道今夕來此意子良問不審氏字可得示不女曰姓李字飛華淮陰人來易遷中已九十四年既始受學未能超進今者之來乃趙夫人見使便别曰十九日期君於西阿子良斂手而别此女年可二十三四許有兩人同來唯此女言耳一人當是侍者也右一條十一日夜所受記書一白藤紙此日師出冰館仍上山日沒後還東嶺周遜入至住處已黃昏仍留其停宿于時在冰口屋尋嶺內清淨神女不集西廨混雜反欲相從未達此趣以為於色六月十二日有五人來乃三更中一人年可三十餘黃華冠雲錦毛衣侍者四人執紫毛節持流全鈴此馮真人也真誥有一人芙蓉冠絳繡衣侍者二人無所執則張子安也真誥見一人芙蓉玄冠緑繡衣侍者二人則中山人洪先生也真誥無一人敖幘朱衣紫草帶侍者六人皆公服悉有所執持則樂丞真誥者一人兩髻亦繡衣此華陽童右五人前三人列坐南牀丞及童坐書牀子丞前進曰今夕有高真來可起可起子良因起拜前者前者曰可坐子良還坐又曰周生修功積德可謂不負其志乎張君曰明鑒鏡察理當照其胸懷耳答曰如來辭洪君曰見周生不中路怡發乎怡發字並應作怠廢字答曰不怡發雖怡亦不能毁其金簡丞曰周生可謂保仙之人前者乃問子良曰今日諸人來暢爾懷抱不子良答曰枉蒙上真賜降腐穢欣懼交心無以自厝乃笑而不言華陽童子曰此諸真人君當不盡識今將相告上者嵩高真人馮先生第二即蕭間仙卿張君第三即中嶽仙人洪先生第四乃保命府丞樂道士第五則我華陽之天司農玉童故令君悉知姓位此中諸位任何如世上侍中公卿邪子良答曰真仙高靈豈得以比於塵俗丞曰能察幽惻應作測字冥者周生是也今者既曲紆真降願各為其述一文真人曰卿是其明證可前作答曰敢不聞旨但恐卑人居前非禮耳丞乃令子良襞紙染筆口授曰華景輝瓊林清風散紫霄仰携高真士淩空馭緑軺放彼朱霞館造此塵中僚有緣自然會不待心翹翹馮真人授曰太霞鬱紫蓋景風飄羽輪直造塵滓際萬穢澆我身自非保仙子安見今日人過此未申歲控景朝太真冥緣雖有契執德故須勤張仙卿授曰寫我蕭間館遊彼塵喧際騁景蓋飛霄尋此人間契周生一何奇能感玄人輒無使淩雲幹中隨嚴霜折洪先生授曰靈風扇紫霞景雲散丹暉八素不為回九垓何足巍志業雖有少一字習之亦成微勗此今日事金闕方共歸華陽童授曰懸臺淩紫漢峻階登絳雲華景飛形燭七耀亦殊分寫此步塵穢適彼超世君朂哉二祀內無令邪世門方為去來會短辭何用紛詩畢馮真人曰諸人所述足以相勸戒可自思緣運尅列單心應作厲丹字當復有來者若能用思入微飛龍轅於霞路奏鳳響於云衢神童啓節玉女侍軒豈待彌劫乎得道悉在方寸之裏耳不必須形勞神損也世人唯知服食吞符苟非其分亦為徒勤更不及專營功德善積功滿道亦可議但於後生得之不施於今身矣此言亦可告家人令知之子良唯唯奉從張曰真君此言可謂至教若更能超踰往此則二府希之難矣蕭間堂兮將為周子之遊館乎洪君曰仁功苟積則選為真人府中小丞其亦未必止此丞曰其功已定亦何必須勤勤童曰二君亦適人所為不必相逼若能積業更深則成真人功夫若怠猶當不失此丞言畢同辭别徘徊户內而滅右一條十二日所受記書四白紙此中玉人三人已經來馮真人樂丞今降案真誥有西嶽真人馮延壽疑此應猶是也樂丞字長治成陽人主災害四丞中之一也夫仙真詩詠才辭通皆相類真誥中有此甚多亦無相越者尋此降集所受辭意如似略示東華保晨之舉也乙未年六月十三日夜見前帥來言曰比者真仙遊降足致欣暢乎我比恆有事遂成冥隔子良答曰近來乾坤澄淨七景齊明仰降高靈稍蒙已數但滓穢無以克承耳帥曰是卿千秋之功無嗟以滓穢為辭但卿六世祖眉為譙郡時尤好射獵殺傷無數賴其中時復營功德罪已得釋卿不宜復食肉食肉恐先源建卿幸可慎之仙藥草自足何急噉此恐卿不悟故因暇來相報爾子良唯承受帥便去右一條十三日所受記書一小碧紙未檢汝南周家譜不知周眉晉何帝時為譙郡殺戮之咎誠為莫大但身尚以蒙釋方慮殃延苗裔小為難解亦當如立善功身既荷福慶流子孫邪此帥僕一我亦未領至六月十五日夜中山人去後依别記目有六月十五日中嶽洪先生授洞房經云云而檢函中不見此受恐當是修事與祕車不題文迹亦可已别投藏計此正應是卧斗法事與前二星相涉所以猶是洪先生授之聞其在西廨及移朱陽所眠一牀絶惡人近身少遊雜夕輒别牀卧如此必是修方諸卧斗之法此法是上清中品經理非下仙之品又一人來甚華少白衣傳范帥語云前故相告食肉事遂不能斷耶今旦何意往他人處食脯從今去勿復爾望採前言副今日懷子良答曰早至師間師賜食謂是甘果下以為欺又奉今旨敢復近肉此人應爾而去右一條十五日所受記一白藤紙其好全似楊君體其十四旦已向姨母云不得食肉晚入嶺亦見向説如范帥語于時即然許之十五日旦又入因進往潘淵文間潘與共醮仍逼勸令其專志夜便得此信十六日旦即復見向説之從此都斷惡其今答語云師賜此亦復方便説以解責也其去歲十月至今年三月恆菜食既辛苦疲瘦姨母更勸令漸進裁少少而已尋又造罪尤非唯拘於先殃所及既吞噬衆生理乖慈育之氣涉乎仁心者必宜斷之以成性是以仙聖為體一向絶之六月十九日有五女人來此則是前十一夕李飛華於嶺裏所告十九日期於西阿者第一易遷領學仙妃趙夫人字素臺年三十許綵繡衣也真誥有此女第二易遷左嬪王夫人改字太英年一十許紫衣也真誥有王進賢恐是改名即是第三易遷右嬪劉夫人字玄微年一十許緑衣真誥有劉春龍而此不同若云改名恐非第四易遷都司學陶夫人改字智安年四十許上緑下紫衣科斗恐許此改即是許掾母第五易遷受學李飛華年可二十許前已經來者上緑下碧衣真誥無此前云入易遷始九十四年右五人字位並李飛華所説説竟四人齊坐李猶倚又有八侍女一人捧巾箱箱上有題一人腰各帶大符符方一尺許黑書青素上一人執一函以蓋致函下合執之函中有囊囊有黃題應是經書四人各執一牙板板上字極細不可識並皆䌝綾衣紫絳為腰帶也衆仙自共語良久似論子良事不正了其旨趙夫人乃見告曰子冥契久著故能招感真仙良助欣然子良答曰不以猥俗少便依道籍以緣幸能棲林谷豈期一旦真仙啓降喜懼交心無以自安若前因可採願賜神仙要訣以見成就夫人曰子名書紫簡何憂不仙而求於我我猶仙人耳劉夫人曰周生爾知積業樹因從何而來得如今日乎子良答曰微塵下俗實所不究夫人曰今略為説之爾生周逵家時已應得道為貪濁彌多遂不致獲次生劉偉家乃得學道精勤精勤之福方流今身爾已經三過上仙籍其中或犯非法而復落去今日之會上録來已七十餘年故經生死乃遂吾經以此事咨受録君君見告如此故為宣説令知源由耳王夫人曰劉右嬪之言備説幽顯宿命爾可心自知之勿示凡俗悠悠之人陶夫人曰周年十九丁丑生水命人因謂趙曰此比何似趙曰亦無定總真王君丁丑生水命人位為高真張酸亦丁丑生乃沉淪三官此不可為定但論功業何如耳陶曰實如來告劉夫人又告子良曰夫神仙雖通玄感徹則易但凡情虛微不能招其感耳我等今來者直尋有道者耳非浮遊無著泛濫而行也幸勿令人知知亦未然此事或生疑誚以回爾心我乃無怪於彼但恐自招其罪耳子良曰已蒙神降豈敢自有疑但欲時呈師母耳不敢以告悠悠者又日亦勿甲乙告之趙夫人又告曰仙道有幽虛之趣今粗為説之夫為真仙之位者偃息玄官遊行紫漢動則二景舒明靜則風雲息氣服則翠羽飛裳乘則飆輪靈軫浮海歷嶽遊眄八方進無水火之患退無木石之憂豈不足稱高貴乎人唯見軒冕之榮嬪房之樂便為極矣所以真道不交乎世神仙罕遊人間正為此耳縱有知者亦不能窮而修之或修而不久或久而不精諸如此事良亦可悲周生爾勿效此凡庸之疇也王夫人告曰夫一志直往無回還應作環字之慮瀟灑任理無纍著之心者此乃保賢之子也儻有窮幽測遠遠求師友書夜辛勤積以歲月或直坐一山修經用法吞符翕景處七元者亦皆能致道終不及積業用功果之快耳爾可以此事告於來子令勤之也修此不止不患身後徒空爾自己定無煩於其間矣陶夫人曰若能守道不動服氣吞景以鎮五藏者亦能得地仙長生不死若無金丹五芝終不能飛遊太極動靜無方也吾今猶是仙之中者未及上仙下真也前服氣諸事往亦為之而得如今日耳周生爾營之乎言語粗悉入四更中趙曰星已疏矣行當應曙相與去和諸人同應去趙又曰方當去來不為久别王曰趙夫人來當無不相隨劉曰來月三日當往東華呈學簿當學陶夫人相過子良問何學簿曰是易遷中教仙人學業有進退之簿二月日多一呈呈東華大司命入月三是此二月之最至九月復呈如此周而復始陶曰且作十餘日别李曰其間動靜趙夫人當見使來去不復辭别便悉下牀而去侍女隨次而滅右一條十九日夜所受記書六小青箋紙尋此諸夫人所説並無義旨非必止在周生亦以兼戒學者明智功德之義過於專修觀夫議理亦聞則其理可見也六月二十一日夜夢一人年可三十許白布袴褶平上幘執手版版黑色形容乃端雅見敬自稱趙丞使下官相聞而言曰昨所與陶隱居共有辭欲須雨事國主憂民乃至但時運應爾比諸處屢有章辭皆不與報陶既有功行周方來於此當為驗二人之德不煩謙謙恐悒望故遣報子良曰比風日赫烈塘湖熇竭五穀焦枯草木雕落方慮飢乏故冒共投辭希垂沾潤此人曰當不慮不雨恐不得洪溢耳前辭言語乃好但請雨應墨書請晴應朱書並青紙上人唯言神重丹青不知丹青有不會處諸如此者世間非一但無人報其此意其既不自知反云神而無靈願更作墨書辭勿同前語子良答輒從要旨又問聖靈何姓可得聞不此人曰問下官耶答曰姓黃字元平東海人猶散在保命趙丞間無位任仍曰不得久停或當更來斂手而去右一條二十一日夜所受記書一白麻紙按此年夏旱不雨積旬諸道士恆章奏永無雲氣隱居是與周共作辭依常朱書青紙二十日晴後共周於靜中奏之故二十一日夜得此夢周二十二日夜乃作墨辭於其廨廷壇自奏二十三旦周向家云昨夕有人報云今日中當雨爾旦天清赤熱了無雨意至禺中周來入嶺至上便見東邊風雲卒起末達隱居間於路便雨地得好溜唯在一山周回左右耳此一事即共宣顯只疏云夢不知定夢定覺耶華陽隱居甲道士周子良辭竊尋下氏之命粒食為本農功所資在於潤澤頃亢旱積旬苗稼焦涸遠近嗷嗷瞻天崔息百姓祈請永無感降伏聞水雨之任有所司存願哀愍黔首霈垂沾渥呼風召雲膚寸而合使洪潦溢川水陸咸濟則白鶴之詠復興於今共申至誠稽顙辭請謹辭天監十四年太歲乙未六月二十一日辭詣句曲華陽金壇洞天張理禁趙丞前此是前所朱書辭者隱居製周書始檢得後近寫又尋覓周所易木末見六月二十四日晝卧南牀夢一人年可六十許著飄風冠披毛帔紫羅裳手執玉鈴腰帶大符以丹書黃上不似筆迹當是織成未嘗來也侍者兩人皆絳衣進坐乃言曰德秀之美感乎幽冥吾久欲來礙以諸務遂不即果鄧生前亦應為説我來子良曰鄧仙人備述神靈應垂降意比恆洗心潔念仰候真仙乃笑曰鄧亦尋應來良久許乃自悲歎曰昔為孤棲獨往賢莫過為我嘗學道於嵩高積八十餘年蒙得神芝服之而化雖得神涉仙階而尸宅無寄今猶在嵩高南石室中顧之眷戀心未能豁子當不憂此事人言得道不復念形我念形之切裂於肝心可得無棺槨乎吾今乃桐柏金庭琳宫之師領蒼梧仙人鎮朱臺之內姓徐字玄真故令知位字有在耳尋當與鄧生俱來别更委曲不為遠别便不復見須臾復夢見二人乃趙丞前所使黃元平者云昨雨恨不多來月中當更作昨往太山見尊府君送人夕來乃始得除君死録更紀生名如此輩六人尊府君言今還北宫君儻至子良處道我今來此今故來為宣之如此便去右一條二十四日晝寢夢所受記書兩青紙按鄧是此月六日來徐與鄧同在桐柏故相稱引後二十九日仍共來也惟如徐説雖得化化猶戀於委形况在餘神鬼中乎棺槨之事便弗無矣此徐君真誥所無而不知何處人何時得道云周父還北宫則是隸酆都所使去五月趙丞云明年春當生王家今則已去一得受生便連逮絶也又按前劉夫人云爾名上仙籙已七十餘年而今方云太山始除死記生名尋此則仙簡鬼簿各各有名仙簡雖有而鬼簿不除猶為未定是故得上仙名函有落除或仙鬼兩名俱正便無復黜斥還民間或充鬼役若是則周生今日之化永保品矣乙未年六月二十九日夕桐柏有二人來一則桐柏全庭宫上師蒼梧仙人徐玄真衣服如前持玉鈴侍者二人真誥無一則桐柏仙人鄧靈期衣服亦如前但持玉鈴耳侍者亦二人真誥無鄧先言曰久欲相詣礙以此二十七日蒙受書為帝晨執蓋御史治桐柏山南青中館領華陽學仙禁四宫中事以此故致乖爽徐君前來善得接賞耳子良答曰蒙徐君垂顧歡仰無已復蒙今降慶莫過此徐君曰向過茅定録處云始授子玄真經甚助欣然子良答曰謬荷靈啓垂受真法但肉人頑踈修行多替又曰聞子名已入東宫青簡尚末審其事比當與鄧生往為參之答曰賜與參訪實是所希徐仍指鄧曰此君學道來已數百年始今得任子乃坐地獲之故知功夫久有在鄧笑曰周生緣業果始韓侯所説當可言乎徐曰周子雖稟仙緣未得便知前身之事子良因曰鄙塞塵陋豈得知此不韓侯是誰鄧曰是東華仙侯韓惠期領東宫諸簡録治方丈第八玄宫中向云欲參子事者正詣此人耳徐曰今日匆匆不得久停尋當得與鄧生俱來不為遠别下席同出户侍者隨從而滅右一條二十九夕所受記書一大度白麻紙按徐玄定録授子玄經檢别目云六月二十七日華陽童宣定録君旨授太霄隱書玄真內訣云云而今函中亦無此事恐與同房俱别封也論桐柏中仙乃不應相關當鄧領華陽四宫仙禁故得往來四宫者當謂男則童初蕭間女則易遷含真也參簡之事别在七月中右起六月一日至二十九日凡有十三條事書青白大小合二十三紙其洞房玄真二條事於目録中唯闕此餘悉具足周氏冥通記卷之二
